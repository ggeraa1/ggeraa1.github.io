<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Крестики-нолики • Продление хода • Исчезновение</title>
  <link rel="icon" href="a2022.png" type="image/x-icon">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #1a2632 0%, #0b1219 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      padding: 1rem;
      margin: 0;
    }

    .game-container {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 3.5rem;
      padding: 2rem 2rem 2.5rem;
      box-shadow: 0 30px 55px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.12);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.8rem;
      border: 1px solid rgba(255, 255, 255, 0.15);
      max-width: 520px;
      width: fit-content;
    }

    h1 {
      color: #efe2cb;
      font-weight: 500;
      letter-spacing: 3px;
      font-size: 2.2rem;
      text-shadow: 0 4px 10px rgba(0, 0, 0, 0.6);
      margin-bottom: 0.2rem;
      text-align: center;
    }

    .players-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      gap: 1rem;
      color: #e9e1d0;
      font-weight: 500;
      font-size: 1.1rem;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 2.5rem;
      padding: 0.8rem 1.8rem;
    }

    .player-tag {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .human-badge, .ai-badge {
      padding: 0.3rem 1.2rem;
      border-radius: 2rem;
      font-weight: bold;
      letter-spacing: 1px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .human-badge {
      background: #d45d1a;
      color: #ffe5c2;
      text-shadow: 0 0 6px #ff7b24;
    }

    .ai-badge {
      background: #136b9e;
      color: #dcf0ff;
      text-shadow: 0 0 6px #1e90ff;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.9rem;
      background: rgba(8, 15, 22, 0.6);
      padding: 0.9rem;
      border-radius: 2.2rem;
      box-shadow: inset 0 0 14px rgba(0, 0, 0, 0.8);
    }

    .cell {
      width: 5.5rem;
      height: 5.5rem;
      background: #1d2e3f;
      background-image: radial-gradient(circle at 30% 30%, #2c465e, #0f1f30);
      border-radius: 1.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.4rem;
      font-weight: 700;
      text-shadow: 0 4px 8px black;
      box-shadow: 0 10px 15px -5px rgba(0,0,0,0.7), inset 0 -3px 0 rgba(0,0,0,0.5), inset 0 1px 3px rgba(255,255,255,0.2);
      transition: all 0.15s ease;
      cursor: pointer;
      color: #fae3b6;
      user-select: none;
      position: relative;
    }

    /* Состояние тусклой клетки (скоро исчезнет) */
    .cell.fading {
      opacity: 0.45;
      filter: blur(0.6px) grayscale(0.4);
      box-shadow: 0 0 8px rgba(255, 80, 80, 0.5), 0 5px 10px rgba(0,0,0,0.6);
      border: 1px dashed rgba(255, 200, 100, 0.6);
      transition: 0.2s;
    }

    .cell.fading:hover {
      opacity: 0.8;
      filter: blur(0);
      box-shadow: 0 0 16px #ffaa33;
      border: 1px solid #ffb347;
    }

    .cell.X {
      color: #ffb347;
      text-shadow: 0 0 18px #ff8c1a;
    }

    .cell.O {
      color: #6bc9ff;
      text-shadow: 0 0 16px #0080ff;
    }

    .cell:active:not(.disabled) {
      transform: scale(0.94);
    }

    .cell.disabled {
      cursor: not-allowed;
      opacity: 0.55;
      filter: grayscale(0.3);
    }

    .turn-indicator {
      width: 100%;
      text-align: center;
      background: rgba(0, 0, 0, 0.45);
      border-radius: 3rem;
      padding: 0.7rem 1.5rem;
      color: #f7e3b2;
      font-weight: 600;
      font-size: 1.2rem;
      letter-spacing: 0.5px;
    }

    .history-hint {
      font-size: 0.9rem;
      background: rgba(0, 0, 0, 0.5);
      padding: 0.4rem 1.2rem;
      border-radius: 2rem;
      color: #cacaca;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .legend {
      font-size: 0.75rem;
      color: #aaa;
      margin-left: 0.2rem;
    }

    button {
      background: #f3e5ca;
      border: none;
      font-weight: bold;
      font-size: 1rem;
      padding: 0.8rem 2rem;
      border-radius: 2.5rem;
      color: #1e2b3c;
      letter-spacing: 0.8px;
      cursor: pointer;
      box-shadow: 0 6px 0 #8b7a62, 0 10px 18px rgba(0,0,0,0.5);
      transition: 0.08s linear;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,200,0.7);
      font-weight: 700;
    }

    button:active {
      transform: translateY(3px);
      box-shadow: 0 3px 0 #6b5d4a, 0 7px 12px rgba(0,0,0,0.6);
      background: #e7d7b8;
    }

    .message-area {
      font-weight: 600;
      font-size: 1.1rem;
      color: #f7e3b2;
      background: rgba(0,0,0,0.4);
      padding: 0.3rem 1.5rem;
      border-radius: 2rem;
      text-align: center;
    }

    .action-row {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    @media (max-width: 450px) {
      .cell {
        width: 4.5rem;
        height: 4.5rem;
        font-size: 2.8rem;
      }
      .game-container {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
<div class="game-container">
  <h1>✦ КРЕСТИКИ-НОЛИКИ ✦</h1>
  <div class="players-info">
    <div class="player-tag"><span class="human-badge">🧑 X</span> Вы</div>
    <div class="player-tag"><span class="ai-badge">🤖 O</span> Компьютер</div>
  </div>

  <div class="board" id="board"></div>

  <div class="turn-indicator" id="turnIndicator">Ваш ход (X)</div>

  <div class="history-hint" id="historyHint">
    <span>🔄 исчезновение после 3-го хода</span>
    <span class="legend">(тусклая клетка — можно продлить)</span>
  </div>

  <div class="action-row">
    <div class="message-area" id="statusMessage"></div>
    <button id="resetButton">🔄 Новая игра</button>
  </div>
  <div style="color: #8f9fb0; font-size: 0.8rem; margin-top: 0.2rem; text-align: center;">
    💡 Клик по тусклой клетке своего цвета тратит ход, но обновляет её
  </div>
</div>

<script>
  (function() {
    // ---------- ИГРОВЫЕ ДАННЫЕ ----------
    const boardEl = document.getElementById('board');
    const turnIndicator = document.getElementById('turnIndicator');
    const statusMessage = document.getElementById('statusMessage');
    const historyHint = document.getElementById('historyHint');
    const resetButton = document.getElementById('resetButton');

    let board = Array(9).fill(null);
    let humanMoves = [];      // ходы X (индексы)
    let aiMoves = [];         // ходы O (индексы)
    let currentPlayer = 'X';
    let gameOver = false;
    let winner = null;
    let isAiThinking = false;

    // ---------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ----------
    function renderBoard() {
      boardEl.innerHTML = '';
      
      // Определяем множество "тусклых" клеток (первые элементы в очередях при длине 3)
      const fadingCells = new Set();
      if (humanMoves.length === 3) fadingCells.add(humanMoves[0]);
      if (aiMoves.length === 3) fadingCells.add(aiMoves[0]);

      for (let i = 0; i < 9; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        
        if (board[i] === 'X') {
          cell.classList.add('X');
          cell.textContent = 'X';
        } else if (board[i] === 'O') {
          cell.classList.add('O');
          cell.textContent = 'O';
        } else {
          cell.textContent = '';
        }

        // Добавляем класс fading, если клетка должна быть тусклой
        if (fadingCells.has(i) && board[i] !== null) {
          cell.classList.add('fading');
        }

        // Определяем, доступна ли клетка для клика
        const isFadingCurrentPlayer = (currentPlayer === 'X' && board[i] === 'X' && fadingCells.has(i)) ||
                                      (currentPlayer === 'O' && board[i] === 'O' && fadingCells.has(i));
        
        const canClick = !gameOver && !isAiThinking && 
                         (board[i] === null || isFadingCurrentPlayer) &&
                         (currentPlayer === 'X' || currentPlayer === 'O'); // человек ходит только за X
        
        if (!canClick || (currentPlayer === 'O' && !isFadingCurrentPlayer)) {
          cell.classList.add('disabled');
        }

        cell.addEventListener('click', () => handleCellClick(i));
        boardEl.appendChild(cell);
      }
    }

    function updateUI() {
      if (gameOver) {
        if (winner === 'X') turnIndicator.textContent = '🎉 Вы победили!';
        else if (winner === 'O') turnIndicator.textContent = '💻 Компьютер победил';
        else turnIndicator.textContent = '🤝 Ничья!';
      } else {
        turnIndicator.textContent = currentPlayer === 'X' ? 'Ваш ход (X)' : 'Ход компьютера (O)...';
      }
      
      const fadingCount = (humanMoves.length === 3 ? 1 : 0) + (aiMoves.length === 3 ? 1 : 0);
      historyHint.innerHTML = `🕒 Вы: ${humanMoves.length}/3 &nbsp;|&nbsp; Комп: ${aiMoves.length}/3 &nbsp; ${
        fadingCount > 0 ? `⚠️ тусклых: ${fadingCount}` : ''
      }`;
      
      if (gameOver) {
        if (winner === 'X') statusMessage.textContent = '🏆 Вы выиграли!';
        else if (winner === 'O') statusMessage.textContent = '🤖 Компьютер выиграл';
        else statusMessage.textContent = '🤝 Ничья';
      } else {
        statusMessage.textContent = currentPlayer === 'X' ? 'Сделайте ход' : 'Компьютер думает...';
      }
    }

    function checkWinner(boardState = board) {
      const lines = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
      ];
      for (const [a,b,c] of lines) {
        if (boardState[a] && boardState[a] === boardState[b] && boardState[b] === boardState[c]) {
          return boardState[a];
        }
      }
      return null;
    }

    function isBoardFull(boardState = board) {
      return boardState.every(cell => cell !== null);
    }

    // Применяем правило удаления (если длина > 3)
    function applyRemovalRule(player, movesArray, boardRef) {
      while (movesArray.length > 3) {
        const oldest = movesArray.shift();
        if (oldest !== undefined && boardRef[oldest] === player) {
          boardRef[oldest] = null;
        }
      }
    }

    function checkGameState() {
      const w = checkWinner();
      if (w) {
        winner = w;
        gameOver = true;
        return true;
      }
      if (isBoardFull()) {
        gameOver = true;
        winner = null;
        return true;
      }
      return false;
    }

    function switchPlayer() {
      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
    }

    // Обработка клика человека
    function handleCellClick(index) {
      if (gameOver || currentPlayer !== 'X' || isAiThinking) return;
      
      const fadingHumanIndex = humanMoves.length === 3 ? humanMoves[0] : -1;
      const isFadingClick = (board[index] === 'X' && index === fadingHumanIndex);
      const isEmpty = board[index] === null;

      if (!isEmpty && !isFadingClick) return; // нельзя ходить на занятую не тусклую клетку

      // Если клик по тусклой клетке — это продление: удаляем её из очереди и добавляем заново
      if (isFadingClick) {
        // Удаляем старый индекс из массива ходов
        const posInMoves = humanMoves.indexOf(index);
        if (posInMoves !== -1) {
          humanMoves.splice(posInMoves, 1);
        }
        // Добавляем его снова (в конец), клетка остаётся 'X'
        humanMoves.push(index);
        // Не меняем board[index], она остаётся 'X'
        // Правило удаления не сработает, т.к. длина осталась <=3
        renderBoard();
        updateUI();
        
        // Проверяем победу после продления? Продление не меняет доску, победа не может возникнуть.
        // Передаём ход компьютеру
        switchPlayer();
        renderBoard();
        updateUI();
        scheduleAiMove();
        return;
      }

      // Обычный ход на пустую клетку
      board[index] = 'X';
      humanMoves.push(index);
      applyRemovalRule('X', humanMoves, board);
      
      renderBoard();
      if (checkGameState()) {
        updateUI();
        renderBoard();
        return;
      }
      
      switchPlayer();
      renderBoard();
      updateUI();
      scheduleAiMove();
    }

    function scheduleAiMove() {
      if (gameOver || currentPlayer !== 'O') return;
      isAiThinking = true;
      renderBoard();
      updateUI();
      setTimeout(() => {
        performAiMove();
        isAiThinking = false;
        if (!gameOver) {
          renderBoard();
          updateUI();
        }
      }, 250);
    }

    // ---------- УМНЫЙ ИИ С ПОДДЕРЖКОЙ ПРОДЛЕНИЯ ----------
    function cloneState() {
      return {
        board: [...board],
        humanMoves: [...humanMoves],
        aiMoves: [...aiMoves]
      };
    }

    function restoreState(state) {
      board = [...state.board];
      humanMoves = [...state.humanMoves];
      aiMoves = [...state.aiMoves];
    }

    function evaluateBoard(boardState) {
      const w = checkWinner(boardState);
      if (w === 'O') return 100;
      if (w === 'X') return -100;
      return 0;
    }

    function minimax(state, depth, isMaximizing, alpha, beta) {
      const currentWinner = checkWinner(state.board);
      if (currentWinner === 'O') return 15 + depth;
      if (currentWinner === 'X') return -15 - depth;
      if (isBoardFull(state.board) || depth === 0) {
        let score = 0;
        const center = 4;
        if (state.board[center] === 'O') score += 1.3;
        else if (state.board[center] === 'X') score -= 1.3;
        const corners = [0,2,6,8];
        corners.forEach(c => {
          if (state.board[c] === 'O') score += 0.8;
          else if (state.board[c] === 'X') score -= 0.8;
        });
        return score;
      }

      const emptyCells = [];
      for (let i = 0; i < 9; i++) {
        if (state.board[i] === null) emptyCells.push(i);
      }

      // Добавляем возможность продления тусклой клетки (если есть)
      if (isMaximizing && state.aiMoves.length === 3) {
        const fadingIdx = state.aiMoves[0];
        if (state.board[fadingIdx] === 'O') {
          emptyCells.push(fadingIdx); // рассматриваем продление как ход
        }
      } else if (!isMaximizing && state.humanMoves.length === 3) {
        const fadingIdx = state.humanMoves[0];
        if (state.board[fadingIdx] === 'X') {
          emptyCells.push(fadingIdx);
        }
      }

      if (isMaximizing) {
        let maxEval = -Infinity;
        for (const move of emptyCells) {
          const newState = {
            board: [...state.board],
            humanMoves: [...state.humanMoves],
            aiMoves: [...state.aiMoves]
          };
          
          if (newState.board[move] === 'O' && move === newState.aiMoves[0]) {
            // Это продление тусклой клетки O
            const idx = newState.aiMoves.indexOf(move);
            if (idx !== -1) newState.aiMoves.splice(idx, 1);
            newState.aiMoves.push(move);
          } else {
            newState.board[move] = 'O';
            newState.aiMoves.push(move);
            applyRemovalRule('O', newState.aiMoves, newState.board);
          }
          
          const evalScore = minimax(newState, depth-1, false, alpha, beta);
          maxEval = Math.max(maxEval, evalScore);
          alpha = Math.max(alpha, evalScore);
          if (beta <= alpha) break;
        }
        return maxEval;
      } else {
        let minEval = Infinity;
        for (const move of emptyCells) {
          const newState = {
            board: [...state.board],
            humanMoves: [...state.humanMoves],
            aiMoves: [...state.aiMoves]
          };
          
          if (newState.board[move] === 'X' && move === newState.humanMoves[0]) {
            const idx = newState.humanMoves.indexOf(move);
            if (idx !== -1) newState.humanMoves.splice(idx, 1);
            newState.humanMoves.push(move);
          } else {
            newState.board[move] = 'X';
            newState.humanMoves.push(move);
            applyRemovalRule('X', newState.humanMoves, newState.board);
          }
          
          const evalScore = minimax(newState, depth-1, true, alpha, beta);
          minEval = Math.min(minEval, evalScore);
          beta = Math.min(beta, evalScore);
          if (beta <= alpha) break;
        }
        return minEval;
      }
    }

    function getBestAiMove() {
      const state = {
        board: [...board],
        humanMoves: [...humanMoves],
        aiMoves: [...aiMoves]
      };
      
      const emptyCells = [];
      for (let i = 0; i < 9; i++) {
        if (state.board[i] === null) emptyCells.push(i);
      }
      
      // Добавляем возможность продления тусклой клетки ИИ
      if (state.aiMoves.length === 3) {
        const fadingIdx = state.aiMoves[0];
        if (state.board[fadingIdx] === 'O') {
          emptyCells.push(fadingIdx);
        }
      }

      if (emptyCells.length === 0) return null;

      if (aiMoves.length === 0 && humanMoves.length <= 1) {
        if (state.board[4] === null) return 4;
      }

      let bestScore = -Infinity;
      let bestMove = emptyCells[0];
      const depth = 6;

      for (const move of emptyCells) {
        const newState = {
          board: [...state.board],
          humanMoves: [...state.humanMoves],
          aiMoves: [...state.aiMoves]
        };
        
        if (newState.board[move] === 'O' && move === newState.aiMoves[0]) {
          const idx = newState.aiMoves.indexOf(move);
          if (idx !== -1) newState.aiMoves.splice(idx, 1);
          newState.aiMoves.push(move);
        } else {
          newState.board[move] = 'O';
          newState.aiMoves.push(move);
          applyRemovalRule('O', newState.aiMoves, newState.board);
        }
        
        const moveScore = minimax(newState, depth-1, false, -Infinity, Infinity);
        if (moveScore > bestScore) {
          bestScore = moveScore;
          bestMove = move;
        }
      }
      return bestMove;
    }

    function performAiMove() {
      if (gameOver || currentPlayer !== 'O') return;
      
      const moveIndex = getBestAiMove();
      if (moveIndex === null) return;
      
      // Проверка: продление или обычный ход
      const isFadingAi = (aiMoves.length === 3 && aiMoves[0] === moveIndex && board[moveIndex] === 'O');
      
      if (isFadingAi) {
        const idx = aiMoves.indexOf(moveIndex);
        if (idx !== -1) aiMoves.splice(idx, 1);
        aiMoves.push(moveIndex);
        // доска не меняется
      } else {
        if (board[moveIndex] !== null) {
          const fallback = board.findIndex((v, i) => v === null);
          if (fallback === -1) return;
          board[fallback] = 'O';
          aiMoves.push(fallback);
        } else {
          board[moveIndex] = 'O';
          aiMoves.push(moveIndex);
        }
        applyRemovalRule('O', aiMoves, board);
      }
      
      renderBoard();
      if (checkGameState()) {
        updateUI();
        renderBoard();
        return;
      }
      switchPlayer();
      renderBoard();
      updateUI();
    }

    function resetGame() {
      board = Array(9).fill(null);
      humanMoves = [];
      aiMoves = [];
      currentPlayer = 'X';
      gameOver = false;
      winner = null;
      isAiThinking = false;
      renderBoard();
      updateUI();
    }

    function init() {
      renderBoard();
      updateUI();
      resetButton.addEventListener('click', resetGame);
    }

    init();
  })();
</script>
</body>
</html>
